services:
  backend:
    build: ./backend
    ports:
      - "4102:4102"
    environment:
      PORT: 4102
      CORS_ORIGIN: http://127.0.0.1:5172
      DB_FILE: /app/data/app-db.json
    volumes:
      - ./data:/app/data
  frontend:
    build: ./frontend
    ports:
      - "5102:80"
    depends_on:
      - backend

